name: Deploy to Dev

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::751545121618:role/github-oidc-role
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ALB DNS
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names app-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg REACT_APP_BACKEND_URL=http://${{ steps.alb.outputs.dns }} \
            -t frontend:${{ github.sha }} \
            ./frontend

      - name: Tag frontend image for ECR
        run: |
          docker tag frontend:${{ github.sha }} \
            751545121618.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}

      - name: Push frontend image to ECR
        run: |
          docker push 751545121618.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}

      - name: Build backend Docker image
        run: |
          docker build -t backend:${{ github.sha }} ./backend

      - name: Tag backend image for ECR
        run: |
          docker tag backend:${{ github.sha }} \
            751545121618.dkr.ecr.us-east-1.amazonaws.com/backend:${{ github.sha }}

      - name: Push backend image to ECR
        run: |
          docker push 751545121618.dkr.ecr.us-east-1.amazonaws.com/backend:${{ github.sha }}

      - name: Prepare frontend task definition
        run: |
          sed "s|IMAGE_TAG|${{ github.sha }}|g" infra/task-definitions/frontend.json > frontend-task.json

      - name: Register frontend task definition
        id: frontend-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://frontend-task.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)
          echo "arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Prepare backend task definition
        run: |
          sed -e "s|IMAGE_TAG|${{ github.sha }}|g" \
              -e "s|ALB_DNS|${{ steps.alb.outputs.dns }}|g" \
              infra/task-definitions/backend.json > backend-task.json

      - name: Register backend task definition
        id: backend-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://backend-task.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)
          echo "arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Deploy frontend to GREEN service
        run: |
          aws ecs update-service \
            --cluster dev-cluster \
            --service frontend-green \
            --task-definition ${{ steps.frontend-task-def.outputs.arn }}

      - name: Deploy backend to GREEN service
        run: |
          aws ecs update-service \
            --cluster dev-cluster \
            --service backend-green \
            --task-definition ${{ steps.backend-task-def.outputs.arn }}

      - name: Wait for GREEN services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster dev-cluster \
            --services frontend-green backend-green

      - name: Switch frontend ALB traffic to GREEN
        run: |
          aws elbv2 modify-listener \
            --listener-arn ${{ secrets.ALB_LISTENER_ARN }} \
            --default-actions Type=forward,TargetGroupArn=${{ secrets.GREEN_TG_ARN }}

      - name: Switch backend ALB traffic to GREEN
        run: |
          aws elbv2 modify-rule \
            --rule-arn ${{ secrets.BACKEND_LISTENER_RULE_ARN }} \
            --actions Type=forward,TargetGroupArn=${{ secrets.BACKEND_GREEN_TG_ARN }}
